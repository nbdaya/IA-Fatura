<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EN-AI | Energia Naval + IA</title>

  <style>
    body {
      background: linear-gradient(135deg, #0a192f, #112240);
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(17, 34, 64, 0.95);
      border-radius: 20px;
      max-width: 520px;
      width: 90%;
      padding: 40px 30px 45px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      text-align: center;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      width: 130px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.75;
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      background: #00c897;
      color: #0a192f;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
      display: inline-block;
    }

    .btn:hover {
      background: #00e6a8;
      transform: scale(1.05);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #00c897;
      color: #00c897;
    }

    .btn-outline:hover {
      background: #00c897;
      color: #0a192f;
    }

    /* RESPONSIVO */
    @media (max-width: 500px) {
      h1 {
        font-size: 1.8rem;
      }

      .logo img {
        width: 100px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo">
      <img src="{{ url_for('static', filename='enai_logo.png') }}">
    </div>

    <!-- TÍTULO -->
    <h1>EN-AI ⚡</h1>
    <div class="subtitle">
      Inteligência Energética para o Programa Energia Naval
    </div>

    <!-- BOTÕES -->
    <div class="links">
      <a href="{{ url_for('login') }}" class="btn">Entrar</a>
      <a href="{{ url_for('cadastro') }}" class="btn btn-outline">Cadastrar</a>
    </div>

  </div>

</body>
</html>
