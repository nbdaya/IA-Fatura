<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EN-AI | Energia Naval + IA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* CONTAINER PRINCIPAL */
    .main {
      display: flex;
      height: 100vh;
    }

    /* LADO ESQUERDO */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #0a192f, #112240);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .left-content {
      max-width: 450px;
      text-align: left;
    }

    /* LOGO ESQUERDA */
    .logo-left {
      margin-bottom: 20px;
    }

    .logo-left img {
      width: 180px;
    }

    /* TEXTO */
    .left h1 {
      font-size: 2.6rem;
      margin-bottom: 5px;
    }

    .sub {
      font-size: 1.2rem;
      opacity: 0.85;
      text-align: center;
    }

    /* LADO DIREITO */
    .right {
      flex: 1;
      background: #0a192f;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CARD */
    .card {
      background: #112240;
      padding: 50px 40px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* LOGO DIREITA */
    .logo img {
      width: 200px;
      margin-bottom: 20px;
    }

    /* TÍTULO DIREITA */
    .card h2 {
      margin-bottom: 20px;
      color: white; /* 🔥 corrigido */
    }

    /* BOTÕES */
    .buttons {
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      background: #00c897;
      color: #0a192f;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      margin-right: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00e6a8;
      transform: scale(1.05);
    }

    .btn-outline {
      display: inline-block;
      border: 2px solid #00c897;
      color: #00c897;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-outline:hover {
      background: #00c897;
      color: #0a192f;
    }

    /* RESPONSIVO */
    @media (max-width: 900px) {
      .main {
        flex-direction: column;
      }

      .left {
        height: 40vh;
        text-align: center;
      }

      .right {
        height: 60vh;
      }

      .left h1 {
        font-size: 2rem;
      }

      .logo-left img {
        width: 140px;
      }

      .logo img {
        width: 140px;
      }
    }

  </style>
</head>

<body>

<div class="main">

  <!-- LADO ESQUERDO -->
  <div class="left">
    <div class="left-content">

      <div class="logo-left">
        <img src="{{ url_for('static', filename='enai_logo.png') }}">
      </div>

      <h1>Programa Energia Naval</h1>

      <p class="sub">
        Inteligência Energética
      </p>

    </div>
  </div>

  <!-- LADO DIREITO -->
  <div class="right">
    <div class="card">

      <div class="logo">
        <img src="{{ url_for('static', filename='enai_logo.png') }}">
      </div>

      <h2>Bem-vindo</h2>

      <div class="buttons">
        <a href="{{ url_for('login') }}" class="btn">Entrar</a>
        <a href="{{ url_for('cadastro') }}" class="btn-outline">Cadastrar</a>
      </div>

    </div>
  </div>

</div>

</body>
</html>
