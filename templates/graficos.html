<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EN-AI | Gráficos</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0a192f;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: #112240;
      padding: 30px;
      border-radius: 20px;
    }

    h2 {
      text-align: center;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn-voltar {
      background: #1c2e4a;
      color: white;
    }

    .btn-sair {
      background: #d9534f;
      color: white;
    }

    canvas {
      margin-top: 25px;
    }

    .card {
      background: #0a192f;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }

    .valor {
      font-size: 1.8rem;
      color: #00c897;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="top">
    <a href="{{ url_for('dashboard_geral') }}" class="btn btn-voltar">Voltar</a>
    <a href="{{ url_for('logout') }}" class="btn btn-sair">Sair</a>
  </div>

  <h2>📊 Painel de Consumo e Despesa</h2>

  {% if vazio %}
    <p>Nenhum dado disponível.</p>
  {% else %}

  <!-- DASH -->
  <div class="card">
    <p>💰 Despesa Total (Ano)</p>
    <div class="valor">R$ {{ despesa_total }}</div>
  </div>

  <!-- GRÁFICOS -->
  <canvas id="graficoConsumo"></canvas>
  <canvas id="graficoDespesa"></canvas>

  {% endif %}

</div>

<script>
const consumo = {{ consumo_total }};
const despesa = {{ despesa_total }};

// Consumo
new Chart(document.getElementById('graficoConsumo'), {
    type: 'bar',
    data: {
        labels: ['Consumo Total (kWh)'],
        datasets: [{
            label: 'Consumo',
            data: [consumo],
        }]
    }
});

// Despesa
new Chart(document.getElementById('graficoDespesa'), {
    type: 'bar',
    data: {
        labels: ['Despesa Total (R$)'],
        datasets: [{
            label: 'Despesa',
            data: [despesa],
        }]
    }
});
</script>

</body>
</html>
