<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EN-AI | Cadastro</title>

  <style>
    body {
      background: #0a192f;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #112240;
      border-radius: 20px;
      max-width: 420px;
      width: 100%;
      margin: 20px;
      padding: 35px 30px 40px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      text-align: center;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      width: 110px;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 25px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #1c3b5a;
      margin-bottom: 15px;
      width: 94%;
      background: #0a192f;
      color: #ffffff;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border: 1px solid #00c897;
    }

    button {
      background: #00c897;
      color: #0a192f;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      padding: 12px 40px;
      margin-top: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00e6a8;
      transform: scale(1.03);
    }

    .links {
      margin-top: 18px;
    }

    .links a {
      color: #00c897;
      text-decoration: none;
      font-weight: bold;
      margin: 0 10px;
      font-size: 0.95rem;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .flash {
      margin: 18px 0;
      color: #fff;
      background: #d9534f;
      border-radius: 7px;
      padding: 10px;
      font-weight: bold;
    }

    /* MOBILE */
    @media (max-width: 500px) {
      .logo img {
        width: 90px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo">
      <img src="{{ url_for('static', filename='enai_logo.png') }}">
    </div>

    <h2>EN-AI</h2>
    <div class="subtitle">Energia Naval + Inteligência Artificial</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <input type="text" name="nome" placeholder="Nome completo" required><br>
      <input type="email" name="email" placeholder="Email" required><br>
      <input type="password" name="senha" placeholder="Senha" required><br>
      <input type="password" name="confirma_senha" placeholder="Confirmar senha" required><br>
      <button type="submit">Cadastrar</button>
    </form>

    <div class="links">
      <a href="{{ url_for('login') }}">Entrar</a>
      |
      <a href="{{ url_for('splash') }}">Voltar</a>
    </div>

  </div>

</body>
</html>
