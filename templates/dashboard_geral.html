<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EN-AI | Dashboard Geral</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0a192f;
            color: white;
        }

        .container {
            background: #112240;
            border-radius: 20px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn-custom {
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-voltar {
            background: #1c2e4a;
            color: white;
        }

        .btn-sair {
            background: #d9534f;
        }

        .btn-excel {
            background: #00c897;
            color: #0a192f;
        }

        table {
            color: white !important;
        }

        th {
            color: #00c897 !important;
        }

        .table {
            background: #112240;
        }

        .table thead {
            background: #0a192f;
        }

        .table-hover tbody tr:hover {
            background: #1c2e4a;
        }

        .alert {
            text-align: center;
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo img {
            width: 100px;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="{{ url_for('static', filename='enai_logo.png') }}">
    </div>

    <h2>📊 EN-AI — Dashboard Geral</h2>

    <div class="top-bar">

        <div>
            <a href="{{ url_for('dashboard') }}" class="btn btn-custom btn-voltar">Voltar</a>
            <a href="{{ url_for('logout') }}" class="btn btn-custom btn-sair">Sair</a>
        </div>

        <div>
            <a href="{{ url_for('exportar_excel') }}" class="btn btn-custom btn-excel">
                📥 Exportar Excel
            </a>
        </div>

    </div>

    {% if tabela %}
        <div class="table-responsive">
            {{ tabela | safe }}
        </div>
    {% else %}
        <div class="alert alert-warning">
            Nenhuma fatura processada ainda.
        </div>
    {% endif %}

</div>

</body>
</html>
